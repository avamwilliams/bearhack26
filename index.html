<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  <style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  height: 100%;
}

body {
  overflow-x: hidden;
  background: url('https://i.postimg.cc/d1Ms2R3J/Screenshot-2026-04-04-103604.png') center/cover no-repeat;
  font-family: 'Inter', sans-serif;
}

/* HEADER */
.header {
  width: 100%;
  height: 100px;
  background-color: #1d2040;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 20px;
}

.logo {
  font-weight: bold;
  font-size: 40px;
  color: white;
  margin: 0;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.button {
  border: 1px solid white;
  border-radius: 6px;
  color: white;
  padding: 12px 20px;
  font-size: 18px;
  cursor: pointer;
  background-color: transparent;
  transition: 0.3s;
  text-decoration: none;
}

.button:hover {
  background-color: white;
  color: black;
  text-decoration: none;
}

/* TITLES */
.title {
  color: white;
  font-size: 40px;
  font-weight: bold;
  text-align: center;
  margin-top: 40px;
}

.center-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin-top: 30px;
}

/* BOXES */
.fancybox {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  width: 40%;
  padding: 20px;

  background: rgba(29, 32, 64, 0.6);
  border-radius: 12px;

  backdrop-filter: blur(10px);
}

/* TEXT */
.subtitle {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  color: white;
}

.pill {
  background-color: white;
  color: #1d2040;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 16px;
  font-weight: bold;
}

/* FILE BUTTON */
.file-button {
  display: inline-block;
  background-color: white;
  color: #1d2040;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  margin-top: 10px;
}

.file-button:hover {
  background-color: #e6e6e6;
}

#fileName {
  color: white;
  text-align: center;
  margin-top: 10px;
}
  </style>
</head>

<body>

  <div class="header">
    <img class="logo" src="https://i.postimg.cc/BQ5zfpQw/Untitled686-20260404211313.png" style="height: 90px">

<div class="nav-buttons">
  <a href="index.html" class="button">Import</a>
  <a href="analysis.html" class="button">Analysis</a>
  <a href="info.html" class="button">Info</a>
</div>
  </div>

  <div class="title">Import Health Data</div>

  <div class="center-container">

    <div class="fancybox">
      <div class="subtitle">
        Importing data for:
        <span class="pill">Patient</span>
      </div>
    </div>

    <div class="fancybox">
      <div class="subtitle">Upload CSV File</div>

      <input type="file" id="fileUpload" hidden>

      <label for="fileUpload" class="file-button">
        Choose File
      </label>
      
         <p id="fileName"></p>
         
         <button class="file-button"> Submit </button>
    </div>


  </div>

<script>
  const input = document.getElementById("fileUpload");
  const fileName = document.getElementById("fileName");

  input.addEventListener("change", () => {
    fileName.textContent = input.files[0]?.name || "";
  });
</script>

</body>
</html>
