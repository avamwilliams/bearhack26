<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  <style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  height: 100%;
}

body {
  overflow-x: hidden;
  background: url('https://i.postimg.cc/d1Ms2R3J/Screenshot-2026-04-04-103604.png') center/cover no-repeat;
  font-family: 'Inter', sans-serif;
}

.header {
  width: 100%;
  height: 100px;
  background-color: #1d2040;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}

.logo {
  font-weight: bold;
  font-size: 40px;
  color: white;
  margin: 0;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.button {
  border: 1px solid white;
  border-radius: 6px;
  color: white;
  padding: 12px 20px;
  font-size: 18px;
  cursor: pointer;
  background-color: transparent;
  transition: 0.3s;
  text-decoration: none;
}

.button:hover {
  background-color: white;
  color: black;
  text-decoration: none;
}

.title {
  color: white;
  font-size: 40px;
  font-weight: bold;
  text-align: center;
  margin-top: 40px;
}

.center-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin-top: 30px;
  padding-bottom: 60px;
}

.fancybox {
  width: 40%;
  padding: 20px;
  background: rgba(29, 32, 64, 0.6);
  border-radius: 12px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.subtitle {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  color: white;
}

.pill {
  background-color: white;
  color: #1d2040;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 16px;
  font-weight: bold;
}

.file-button {
  display: inline-block;
  background-color: white;
  color: #1d2040;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  margin-top: 10px;
}

.file-button:hover {
  background-color: #e6e6e6;
}

#fileName {
  color: white;
  text-align: center;
  margin-top: 10px;
}
  </style>
</head>

<body>

  <div class="header">
    <img class="logo" src="https://i.postimg.cc/BQ5zfpQw/Untitled686-20260404211313.png" style="height: 90px">

<div class="nav-buttons">
  <a href="index.html" class="button">Import</a>
  <a href="analysis.html" class="button">Analysis</a>
  <a href="info.html" class="button">Info</a>
</div>
  </div>

  <div class="title">Analysing Health Data</div>

  <div class="center-container">

    <div class="fancybox">
      <div class="subtitle">
        Analysing data for:
        <span class="pill">Patient</span>
      </div>
    </div>

    <input type="file" id="fileUpload" accept=".csv" style="display:none" />
    <label for="fileUpload" class="file-button">Upload CSV</label>
    <p id="fileName"></p>
    <button class="file-button" onclick="runAnalysis()">Analyze</button>

    <div id="results"></div>

  </div>

<script>
  const BACKEND_URL = "http://localhost:5000";

  document.getElementById("fileUpload").addEventListener("change", (e) => {
    document.getElementById("fileName").textContent = e.target.files[0]?.name || "";
  });

  async function runAnalysis() {
    const file = document.getElementById("fileUpload").files[0];
    if (!file) return alert("Please upload a CSV file first.");

    const formData = new FormData();
    formData.append("file", file);

    document.getElementById("results").innerHTML = "<p style='color:white; text-align:center;'>Analyzing... please wait</p>";

    try {
      const res  = await fetch(`${BACKEND_URL}/analyze`, { method: "POST", body: formData });
      const data = await res.json();
      displayResults(data);
    } catch (err) {
      document.getElementById("results").innerHTML = "<p style='color:red; text-align:center;'>Error: make sure your backend is running on localhost:5000</p>";
    }
  }

  function displayResults(samples) {
    const alertColors = { LOW: "#4caf50", MEDIUM: "#ff9800", HIGH: "#f44336" };
    document.getElementById("results").innerHTML = samples.map(s => `
      <div class="fancybox" style="width:70%; margin-top:20px; text-align:left;">

        <div class="subtitle" style="margin-bottom:10px;">
          Sample #${s.sample} &nbsp;
          <span class="pill" style="background:${alertColors[s.alert_level]}; color:white;">${s.alert_level}</span>
        </div>

        <p style="color:white; margin:4px 0;">Prediction: <b>${s.prediction}</b> — Confidence: ${s.confidence}%</p>
        <p style="color:white; margin:4px 0;">Severity: ${s.severity} / 100</p>
        <p style="color:white; margin:4px 0;">Normal: ${s.class_probs.normal}% &nbsp;|&nbsp; Spoofing: ${s.class_probs.spoofing}% &nbsp;|&nbsp; Data Alteration: ${s.class_probs.data_alt}%</p>

        <hr style="border-color:rgba(255,255,255,0.2); margin:10px 0; width:100%;">

        <p style="color:white; margin:4px 0;"><b>Signal Breakdown:</b></p>
        <p style="color:white; margin:4px 0;">RF Attack Prob: ${s.signals.rf_attack_prob}% &nbsp;|&nbsp; Isolation Forest: ${s.signals.iso_score}% &nbsp;|&nbsp; Autoencoder: ${s.signals.ae_anomaly}%</p>

        <hr style="border-color:rgba(255,255,255,0.2); margin:10px 0; width:100%;">

        <p style="color:white; margin:4px 0;"><b>Top 5 SHAP Features:</b></p>
        ${Object.entries(s.top5_shap).map(([k,v]) => `<p style="color:#ccc; margin:2px 0; font-size:14px;">&nbsp;&nbsp;${k}: ${v}</p>`).join("")}

        <p style="color:white; margin:8px 0 4px;"><b>Top 5 Autoencoder Deviations:</b></p>
        ${Object.entries(s.top5_recon).map(([k,v]) => `<p style="color:#ccc; margin:2px 0; font-size:14px;">&nbsp;&nbsp;${k}: ${v}</p>`).join("")}

        <hr style="border-color:rgba(255,255,255,0.2); margin:10px 0; width:100%;">

        <p style="color:white; margin:4px 0;"><b>Recommendations:</b></p>
        ${s.suggestions.map(r => `<p style="color:#90caf9; margin:2px 0; font-size:14px;">• ${r}</p>`).join("")}

      </div>
    `).join("");
  }
</script>

</body>
</html>
