<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  overflow-x: hidden;
  background: url('https://i.postimg.cc/d1Ms2R3J/Screenshot-2026-04-04-103604.png') center/cover no-repeat;
  font-family: 'Inter', sans-serif;
}
.header {
  width: 100%; height: 100px;
  background-color: #1d2040;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.logo { font-weight: bold; font-size: 40px; color: white; margin: 0; }
.nav-buttons { display: flex; gap: 10px; }
.button {
  border: 1px solid white; border-radius: 6px; color: white;
  padding: 12px 20px; font-size: 18px; cursor: pointer;
  background-color: transparent; transition: 0.3s; text-decoration: none;
}
.button:hover { background-color: white; color: black; }
.title { color: white; font-size: 40px; font-weight: bold; text-align: center; margin-top: 40px; }
.center-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
.fancybox {
  width: 40%; padding: 20px;
  background: rgba(29, 32, 64, 0.6);
  border-radius: 12px;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.subtitle { display: flex; align-items: center; gap: 10px; font-size: 20px; color: white; }
.pill {
  background-color: white; color: #1d2040;
  padding: 6px 14px; border-radius: 999px; font-size: 16px; font-weight: bold;
}
.file-button {
  display: inline-block; background-color: white; color: #1d2040;
  padding: 10px 18px; border-radius: 8px; font-size: 16px; font-weight: bold;
  cursor: pointer; transition: 0.3s; margin-top: 10px;
}
.file-button:hover { background-color: #e6e6e6; }
#fileName { color: white; text-align: center; margin-top: 10px; }
 
/* ── Report box ── */
#reportBox {
  width: 70%; padding: 24px;
  background: rgba(29, 32, 64, 0.85);
  border-radius: 12px;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  color: white; font-family: 'Courier New', monospace; font-size: 13px;
  white-space: pre-wrap; line-height: 1.6;
  display: none;               /* hidden until results arrive */
}
#reportBox.visible { display: block; }
 
/* alert badge colours */
.badge-HIGH   { color: #ff4d4d; font-weight: bold; }
.badge-MEDIUM { color: #ffaa00; font-weight: bold; }
.badge-LOW    { color: #4dff91; font-weight: bold; }
 
.spinner {
  display: none; color: white; font-size: 18px;
  text-align: center; margin-top: 10px;
}
.spinner.visible { display: block; }
  </style>
</head>
<body>
 
<div class="header">
  <p class="logo">HealthHop</p>
  <div class="nav-buttons">
    <a href="import.html"   class="button">Import</a>
    <a href="analysis.html" class="button">Analysis</a>
    <a href="info.html"     class="button">Info</a>
  </div>
</div>
 
<div class="title">Analysing Health Data</div>
 
<div class="center-container">
 
  <!-- Patient pill -->
  <div class="fancybox">
    <div class="subtitle">
      Analysing data for: <span class="pill">Patient</span>
    </div>
  </div>
 
  <!-- Upload box -->
  <div class="fancybox" style="width:70%">
    <label class="file-button" for="fileUpload">Upload CSV</label>
    <input type="file" id="fileUpload" accept=".csv" style="display:none" />
    <div id="fileName"></div>
    <button class="file-button" id="analyzeBtn" style="margin-top:14px;display:none">
      Run Analysis
    </button>
  </div>
 
  <div class="spinner" id="spinner">⏳ Running analysis…</div>
 
  <!-- Report output -->
  <div id="reportBox"></div>
 
</div><!-- end center-container -->
 
<script>
const API_URL = "http://localhost:5000/analyze";  // change if you deploy
 
const fileInput  = document.getElementById("fileUpload");
const fileLabel  = document.getElementById("fileName");
const analyzeBtn = document.getElementById("analyzeBtn");
const spinner    = document.getElementById("spinner");
const reportBox  = document.getElementById("reportBox");
 
// Show filename + reveal Run button when a file is chosen
fileInput.addEventListener("change", () => {
  const name = fileInput.files[0]?.name || "";
  fileLabel.textContent = name;
  analyzeBtn.style.display = name ? "inline-block" : "none";
  reportBox.classList.remove("visible");
  reportBox.innerHTML = "";
});
 
// Send file to Flask, render results
analyzeBtn.addEventListener("click", async () => {
  const file = fileInput.files[0];
  if (!file) return;
 
  spinner.classList.add("visible");
  reportBox.classList.remove("visible");
  reportBox.innerHTML = "";
  analyzeBtn.disabled = true;
 
  try {
    const formData = new FormData();
    formData.append("file", file);
 
    const res  = await fetch(API_URL, { method: "POST", body: formData });
    const data = await res.json();
 
    if (data.error) {
      reportBox.innerHTML = `<span style="color:#ff4d4d">Error: ${data.error}</span>`;
    } else {
      reportBox.innerHTML = formatResults(data);
    }
    reportBox.classList.add("visible");
 
  } catch (err) {
    reportBox.innerHTML =
      `<span style="color:#ff4d4d">Could not reach backend.\nMake sure app.py is running on port 5000.\n\n${err}</span>`;
    reportBox.classList.add("visible");
  } finally {
    spinner.classList.remove("visible");
    analyzeBtn.disabled = false;
  }
});
 
// ── Format the JSON results into readable text ──────────────────────────────
function formatResults(results) {
  const W = 62;
  const line  = "═".repeat(W);
  const dash  = "─".repeat(W);
  let out = "";
 
  results.forEach((r, i) => {
    // Normal traffic → simple message
    if (typeof r === "string") {
      out += `${line}\n`;
      out += `  IOMT SECURITY REPORT — Sample #${i + 1}\n`;
      out += `${line}\n`;
      out += `  ✅  ${r}\n`;
      out += `${line}\n\n`;
      return;
    }
 
    const { prediction, top_features, suggestions } = r;
 
    // Severity colours
    const isHigh   = prediction.toLowerCase().includes("alteration") ||
                     prediction.toLowerCase().includes("spoofing");
    const alertLvl = isHigh ? "HIGH" : "MEDIUM";
    const badge    = `<span class="badge-${alertLvl}">${alertLvl}</span>`;
 
    out += `${line}\n`;
    out += `  IOMT SECURITY REPORT — Sample #${i + 1}\n`;
    out += `${line}\n`;
    out += `\n\tPrediction : ${prediction}\n`;
    out += `\tALERT LEVEL: ${alertLvl}\n`;     // plain text (badge added below)
    out += `\n${dash}\n`;
    out += `  Top contributing features:\n`;
    top_features.forEach(f => { out += `    • ${f}\n`; });
    out += `\n${dash}\n`;
    out += `  Recommendations:\n`;
    suggestions.forEach(s => { out += `    ➤ ${s}\n`; });
    out += `\n${line}\n\n`;
  });
 
  // Swap plain ALERT LEVEL text for coloured badge
  return out
    .replace(/ALERT LEVEL: HIGH/g,   `ALERT LEVEL: <span class="badge-HIGH">HIGH</span>`)
    .replace(/ALERT LEVEL: MEDIUM/g, `ALERT LEVEL: <span class="badge-MEDIUM">MEDIUM</span>`)
    .replace(/ALERT LEVEL: LOW/g,    `ALERT LEVEL: <span class="badge-LOW">LOW</span>`);
}
</script>
</body>
</html>
